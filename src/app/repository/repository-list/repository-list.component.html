<div class="repo-page">

  <div class="d-flex align-items-center gap-2 mb-3">
    <h2 class="fs-5 fw-semibold text-dark mb-0">Repositorios</h2>
    <span class="count-badge">{{ repos.length }} repositorios</span>
  </div>

  <div class="d-flex flex-column gap-2 mb-4">
    <div
      *ngFor="let repo of repos | paginate: { itemsPerPage: itemsPerPage, currentPage: page }"
      class="repo-card"
      [routerLink]="['/repositories', repo.id]"
    >
      <div class="repo-card__top mb-1">
        <span class="repo-name">{{ repo.name }}</span>
      </div>
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <span class="lang-badge" [ngStyle]="getLangStyle(repo.language)">{{ repo.language }}</span>
        <span class="repo-stars">★ {{ repo.stars }}</span>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-center">
    <pagination-controls
      (pageChange)="page = $event"
      [autoHide]="true"
      previousLabel="‹"
      nextLabel="›"
    ></pagination-controls>
  </div>

</div>
