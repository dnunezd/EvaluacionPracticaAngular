<div class="repo-page">

  <div class="d-flex align-items-center gap-2 mb-3">
    <h2 class="fs-5 fw-semibold text-dark mb-0">Repositorios</h2>
    <span class="count-badge">{{ repos.length }} repositorios</span>
  </div>

  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3 mb-4">
    <div class="col"
      *ngFor="let repo of repos | paginate: { itemsPerPage: itemsPerPage, currentPage: page }"
    >
      <div class="repo-card h-100" [routerLink]="['/repositories', repo.id]">
        <div class="repo-name mb-2">{{ repo.name }}</div>
        <p class="repo-desc">{{ repo.description }}</p>
        <div class="d-flex align-items-center gap-2 flex-wrap mt-auto">
          <span class="lang-badge" [ngStyle]="getLangStyle(repo.language)">{{ repo.language }}</span>
          <span class="repo-stars ms-auto">★ {{ repo.stars }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-center">
    <pagination-controls
      (pageChange)="page = $event"
      [autoHide]="true"
      previousLabel="‹"
      nextLabel="›"
    ></pagination-controls>
  </div>

</div>
